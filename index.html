<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youngkeukeu</title>
    <style>
 body{
    background: whitesmoke;
    font-family: arial, sans-serif;
}

.container{
    width:800px;
    margin:auto;
    background:white;
    border:2px solid #ccc;
}

.header{
    background:red;
    color:white;
    padding:15px;
    text-align:center;
    font-family:verdana, sans-serif;
}

.menu{
    background:greenyellow;
    padding:10px;
    border-top:1px solid #ccc;
    border-bottom:1px solid #ccc;
}

.menu a{
    color:black;
    text-decoration:none;
    margin-right:20px;
    font-weight:bold;
}

.menu a:hover{
    color:red;
    text-decoration:underline;
}

.banner img{
    width:100%;
    height:250px;
    border-radius:10px;
}

.kiri{
    width:20%;
    float:left;
    padding:10px;
    box-sizing:border-box;
}

.tengah{
    width:50%;
    float:left;
    padding:10px;
    box-sizing:border-box;
}

.kanan{
    width:30%;
    float:left;
    padding:10px;
    box-sizing:border-box;
}

h3{
    color:red;
    font-family:verdana, sans-serif;
}

table{
    width:100%;
    border-collapse:collapse;
}

table, th, td{
    border:1px solid black;
}

th{
    background:greenyellow;
}

th, td{
    padding:8px;
    text-align:center;
}

input,
select{
    width:100%;
    padding:8px;
    border:1px solid gray;
    border-radius:5px;
    font-family:arial;
}

button{
    background:greenyellow;
    color:black;
    border:1px solid green;
    padding:8px 15px;
    border-radius:5px;
    font-family:arial;
    cursor:pointer;
}

button:hover{
    background:green;
    color:white;
}

.footer{
    clear:both;
    background:red;
    color:white;
    text-align:center;
    padding:15px;
    font-family:verdana, sans-serif;
}
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>cafe barbar</h1>
            <p>tempat kopi youngkeukeu</p>
        </div>

        <div class="menu">
            <a href=".">home</a>
            <a href=".">menu</a>
            <a href=".">about</a>
            <a href=".">contact</a>
        </div>

        <div class="banner">
            <img src="cortis.jpg" alt="cafe">
        </div>

        <div class="kiri">
            <h3>pesan kopi</h3>

            <form>
                <input type="text" placeholder="nama"><br><br>

                <select>
                    <option>pilih menu</option>
                    <option>frappucino</option>
                    <option>matcha</option>
                    <option>americano</option>
                </select><br><br>
            </form>
        </div>

        <div class="tengah">
            <h3>menu favourite</h3>
            <img src="cortis.jpg" alt="kopi" width="100%">

            <p>menyediakan makanan,minuman dengan harga terjangkau</p>

            <table border="1">
                <tr>
                    <th>menu</th>
                    <th>harga</th>
                </tr>

                <tr>
                    <td>matcha</td>
                    <td>50.000</td>
                </tr>

                <tr>
                    <td>frappucino</td>
                    <td>45.000</td>
                </tr>
            </table>
        </div>

        <div class="kanan">
            <h3>jam buka</h3>
            <p>senin-minggu</p>
            <p>16.00 - 00.00</p>

            <h3>informasi</h3>

            <ul>
                <li>promo</li>
                <li>menu baru</li>
                <li>event</li>
            </ul>
        </div>

        <div class="footer">
            <p>&copy; 2026 youngkeukeu</p>
        </div>
    </div>
</body>
</html>
